<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Bugs -- Bug Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="theme.js?v=3"></script>
  <script src="data.js?v=3"></script>
  <script>window.CURRENT_PAGE = 'bugs';</script>
  <script src="nav.js?v=3"></script>
  <script src="filters.js?v=3"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
    .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200px 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
  </style>
</head>

<body class="bg-slate-950 text-slate-300 font-sans min-h-screen antialiased">
  <div id="nav-root"></div>

  <main class="ml-0 lg:ml-[260px] min-h-screen">
    <div class="max-w-[1280px] mx-auto px-6 py-8 pt-14 lg:pt-8">

      <!-- Page header -->
      <div class="mb-6">
        <h2 class="text-xl font-semibold text-slate-100">All Bugs</h2>
        <p id="bug-count" class="text-sm text-slate-500 mt-1">Loading...</p>
      </div>

      <!-- Active filters -->
      <div id="active-filters" class="mb-4"></div>

      <!-- Filter bar -->
      <div id="filter-bar" class="mb-6 bg-slate-900/50 border border-slate-800 rounded-lg p-4"></div>

      <!-- Sort controls -->
      <div id="sort-controls" class="mb-4 flex items-center gap-3"></div>

      <!-- Bug table -->
      <div id="bug-table"></div>

      <!-- Load more -->
      <div id="load-more" class="mt-4 text-center"></div>

    </div>
  </main>

  <script>
    let currentFilters = {};
    let currentSort = { key: 'createdAt', dir: 'desc' };
    let displayLimit = 50;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!hasApiKey()) {
        window.location.href = 'settings.html';
        return;
      }

      try {
        await refreshData();
        updateNavStats();
        currentFilters = Filters.fromURL();
        // Apply sort from URL if present (e.g. ?sort=age)
        const urlSort = Filters.sortFromURL();
        if (urlSort) currentSort = urlSort;
        renderAll();
      } catch (e) {
        document.getElementById('bug-table').innerHTML = `
          <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-6 text-center">
            <p class="text-red-400 text-sm">${Theme.escapeHtml(e.message)}</p>
          </div>
        `;
      }
    });

    function onFilterChange(newFilters) {
      currentFilters = newFilters;
      displayLimit = 50;
      // Update URL without reload
      const url = Filters.toURL('bugs.html', newFilters);
      history.replaceState(null, '', url);
      renderAll();
    }

    function renderAll() {
      const filtered = Filters.apply(window.BUGS, currentFilters);
      const sorted = sortBugs(filtered, currentSort);

      // Count
      document.getElementById('bug-count').textContent =
        Filters.hasActive(currentFilters)
          ? `Showing ${filtered.length} of ${window.BUGS.length} bugs (${Filters.activeCount(currentFilters)} filter${Filters.activeCount(currentFilters) > 1 ? 's' : ''} active)`
          : `${window.BUGS.length} total bugs`;

      // Filters
      Filters.renderActiveFilters('active-filters', currentFilters, onFilterChange);
      Filters.renderFilterBar('filter-bar', window.BUGS, currentFilters, onFilterChange);

      // Sort
      renderSortControls();

      // Table
      renderBugTable(sorted);
    }

    // ─── Sorting ────────────────────────────────────────────────────

    function sortBugs(bugs, sort) {
      return [...bugs].sort((a, b) => {
        let va = a[sort.key];
        let vb = b[sort.key];
        if (sort.key === 'createdAt' || sort.key === 'updatedAt') {
          va = new Date(va || 0).getTime();
          vb = new Date(vb || 0).getTime();
        }
        if (sort.key === 'priority') {
          va = va ?? 99;
          vb = vb ?? 99;
        }
        if (sort.key === 'ageDays') {
          va = va ?? 0;
          vb = vb ?? 0;
        }
        if (va < vb) return sort.dir === 'asc' ? -1 : 1;
        if (va > vb) return sort.dir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function handleSort(key) {
      if (currentSort.key === key) {
        currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        currentSort = { key, dir: 'desc' };
      }
      renderAll();
    }

    function renderSortControls() {
      const options = [
        { key: 'createdAt', label: 'Created' },
        { key: 'updatedAt', label: 'Updated' },
        { key: 'priority', label: 'Priority' },
        { key: 'ageDays', label: 'Age' },
      ];

      const buttons = options.map(o => {
        const active = currentSort.key === o.key;
        const arrow = active ? (currentSort.dir === 'desc' ? ' ↓' : ' ↑') : '';
        return `
          <button onclick="handleSort('${o.key}')"
                  class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
                         ${active ? 'bg-blue-500/10 text-blue-400 border border-blue-500/30' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-slate-200'}">
            ${o.label}${arrow}
          </button>
        `;
      }).join('');

      document.getElementById('sort-controls').innerHTML = `
        <span class="text-xs text-slate-600">Sort by:</span>
        ${buttons}
      `;
    }

    // ─── Bug Table ──────────────────────────────────────────────────

    function renderBugTable(bugs) {
      const el = document.getElementById('bug-table');
      const visible = bugs.slice(0, displayLimit);

      if (bugs.length === 0) {
        el.innerHTML = `
          <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-12 text-center">
            <p class="text-slate-500 text-sm">No bugs match the current filters</p>
          </div>
        `;
        document.getElementById('load-more').innerHTML = '';
        return;
      }

      const rows = visible.map(bug => {
        const sc = Theme.statusColor(bug.status);
        return `
          <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 hover:border-slate-700 transition-colors group">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                  <span class="font-mono text-xs text-blue-400">${bug.identifier}</span>
                  ${Theme.statusBadge(bug.status)}
                  ${Theme.severityBadge(bug.severity)}
                  ${Theme.platformBadge(bug.platform)}
                </div>
                <h4 class="text-sm text-slate-200 font-medium leading-snug">${Theme.escapeHtml(bug.title)}</h4>
                <div class="flex items-center gap-3 mt-2 text-xs text-slate-500">
                  <span>${bug.assigneeName}</span>
                  <span>Created ${Theme.relativeTime(bug.createdAt)}</span>
                  <span>${bug.ageDays}d old</span>
                  ${bug.featureArea !== 'Uncategorized' ? `<span class="text-slate-600">${bug.featureArea}</span>` : ''}
                  ${bug.cycleName ? `<span class="text-slate-600">${bug.cycleName}</span>` : ''}
                </div>
              </div>
              <a href="${bug.url}" target="_blank" rel="noopener noreferrer"
                 class="flex-shrink-0 p-1.5 rounded text-slate-600 hover:text-slate-300 hover:bg-slate-800 transition-colors opacity-0 group-hover:opacity-100"
                 title="Open in Linear">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              </a>
            </div>
          </div>
        `;
      }).join('');

      el.innerHTML = `<div class="space-y-2">${rows}</div>`;

      // Load more
      const loadMoreEl = document.getElementById('load-more');
      if (bugs.length > displayLimit) {
        const remaining = bugs.length - displayLimit;
        loadMoreEl.innerHTML = `
          <button onclick="loadMore()" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:bg-slate-700 transition-colors">
            Show ${Math.min(remaining, 50)} more (${remaining} remaining)
          </button>
        `;
      } else {
        loadMoreEl.innerHTML = '';
      }
    }

    function loadMore() {
      displayLimit += 50;
      const filtered = Filters.apply(window.BUGS, currentFilters);
      const sorted = sortBugs(filtered, currentSort);
      renderBugTable(sorted);
    }
  </script>
</body>
</html>
