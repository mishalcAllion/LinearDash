<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile App -- Bug Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="theme.js"></script>
  <script src="data.js"></script>
  <script>window.CURRENT_PAGE = 'mobile';</script>
  <script src="nav.js"></script>
  <script src="charts.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
    .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200px 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
  </style>
</head>

<body class="bg-slate-950 text-slate-300 font-sans min-h-screen antialiased">
  <div id="nav-root"></div>

  <main class="ml-0 lg:ml-[260px] min-h-screen">
    <div class="max-w-[1280px] mx-auto px-6 py-8 pt-14 lg:pt-8">

      <!-- Page header -->
      <div id="page-header" class="mb-8"></div>

      <!-- Flight Search spotlight -->
      <div id="flights-section" class="mb-8"></div>

      <!-- Top KPI cards -->
      <div id="top-kpis" class="mb-8"></div>

      <!-- Status breakdown -->
      <div id="status-section" class="mb-8"></div>

      <!-- Two-column: Severity + Feature Area -->
      <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">
        <div id="severity-section"></div>
        <div id="feature-section"></div>
      </div>

      <!-- Assignee summary -->
      <div id="assignee-section" class="mb-8"></div>

    </div>
  </main>

  <script>
    const PLATFORM = 'Mobile App';
    let isLoading = false;
    let mobileKPIs = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!hasApiKey()) {
        window.location.href = 'settings.html';
        return;
      }

      renderHeader(true);
      renderLoadingState();

      try {
        await refreshData();
        updateNavStats();
        mobileKPIs = computeFilteredKPIs(window.BUGS, { platform: PLATFORM });
        renderHeader(false);
        renderFlightsSpotlight();
        renderTopKPIs();
        renderStatusBreakdown();
        renderSeverityBreakdown();
        renderFeatureAreaBreakdown();
        renderAssigneeSummary();
      } catch (e) {
        renderError(e.message);
      }
    });

    async function handleRefresh() {
      if (isLoading) return;
      isLoading = true;
      renderHeader(true);
      renderLoadingState();

      try {
        await refreshData(true);
        updateNavStats();
        mobileKPIs = computeFilteredKPIs(window.BUGS, { platform: PLATFORM });
        renderHeader(false);
        renderFlightsSpotlight();
        renderTopKPIs();
        renderStatusBreakdown();
        renderSeverityBreakdown();
        renderFeatureAreaBreakdown();
        renderAssigneeSummary();
      } catch (e) {
        renderError(e.message);
      } finally {
        isLoading = false;
      }
    }

    // ─── Header ─────────────────────────────────────────────────────

    function renderHeader(loading) {
      const lastRefresh = getLastRefreshTime();
      const totalMobile = mobileKPIs ? mobileKPIs.total : '';
      document.getElementById('page-header').innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-xl font-semibold text-slate-100">Mobile App Bugs</h2>
            <p class="text-sm text-slate-500 mt-1">
              ${lastRefresh ? `Last refreshed ${Theme.relativeTime(new Date(lastRefresh).toISOString())}` : 'Loading...'}
              ${totalMobile ? ` -- ${totalMobile} mobile bugs` : ''}
            </p>
            <p class="text-xs text-slate-600 mt-0.5 flex items-center gap-1.5">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
              Filtered to platform <span class="font-mono text-slate-500">"Mobile App"</span> with label <span class="font-mono text-slate-500">"Bug"</span>
            </p>
          </div>
          <button onclick="handleRefresh()" ${loading ? 'disabled' : ''}
                  class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors disabled:opacity-50 flex items-center gap-2">
            <svg class="w-4 h-4 ${loading ? 'animate-spin' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            ${loading ? 'Refreshing...' : 'Refresh'}
          </button>
        </div>
      `;
    }

    // ─── Loading / Error ────────────────────────────────────────────

    function renderLoadingState() {
      document.getElementById('flights-section').innerHTML = `<div class="skeleton h-32"></div>`;
      document.getElementById('top-kpis').innerHTML = `<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">${Array(4).fill('<div class="skeleton h-24"></div>').join('')}</div>`;
      document.getElementById('status-section').innerHTML = `<div class="skeleton h-48"></div>`;
      document.getElementById('severity-section').innerHTML = `<div class="skeleton h-64"></div>`;
      document.getElementById('feature-section').innerHTML = `<div class="skeleton h-64"></div>`;
      document.getElementById('assignee-section').innerHTML = `<div class="skeleton h-48"></div>`;
    }

    function renderError(msg) {
      document.getElementById('flights-section').innerHTML = '';
      document.getElementById('top-kpis').innerHTML = `
        <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-6 text-center">
          <p class="text-red-400 text-sm font-medium mb-2">Failed to load bug data</p>
          <p class="text-red-400/70 text-xs font-mono">${Theme.escapeHtml(msg)}</p>
          <button onclick="handleRefresh()" class="mt-3 px-4 py-2 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400 hover:bg-red-500/20 transition-colors">Retry</button>
        </div>
      `;
      ['status-section', 'severity-section', 'feature-section', 'assignee-section'].forEach(id => {
        document.getElementById(id).innerHTML = '';
      });
    }

    // ─── Flight Search Spotlight ────────────────────────────────────

    function renderFlightsSpotlight() {
      const k = mobileKPIs;
      const flightOpen = k.flightBugsOpen || [];
      const flightAll = k.flightBugs || [];

      // Severity breakdown for flights
      const flightSev = {};
      flightOpen.forEach(b => {
        const sev = b.severity || 'No Severity';
        flightSev[sev] = (flightSev[sev] || 0) + 1;
      });

      const sevBadges = SEVERITY_LABELS
        .filter(s => flightSev[s])
        .map(s => {
          const sc = Theme.severityColor(s);
          return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-mono border ${sc.bg} ${sc.text} ${sc.border}"><span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>${flightSev[s]}</span>`;
        }).join(' ');

      const noSev = flightSev['No Severity'] || 0;
      const noSevBadge = noSev > 0 ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-mono border bg-slate-500/10 text-slate-400 border-slate-500/30">${noSev} unlabeled</span>` : '';

      document.getElementById('flights-section').innerHTML = `
        <a href="bugs.html?platform=${encodeURIComponent(PLATFORM)}&feature=${encodeURIComponent('Flight Search')}"
           class="block bg-gradient-to-r from-cyan-500/5 to-blue-500/5 border border-cyan-500/20 rounded-lg p-6 hover:border-cyan-500/40 transition-colors">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              </div>
              <div>
                <h3 class="text-sm font-semibold text-slate-200">Flight Search Bugs</h3>
                <p class="text-xs text-slate-500">Label: Flight Search</p>
              </div>
            </div>
            <div class="text-right">
              <div class="text-2xl font-semibold font-mono text-cyan-400">${flightOpen.length}</div>
              <div class="text-xs text-slate-500">open</div>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            ${sevBadges}
            ${noSevBadge}
            ${flightAll.length > flightOpen.length ? `<span class="text-xs text-slate-600">${flightAll.length - flightOpen.length} closed</span>` : ''}
          </div>
        </a>
      `;
    }

    // ─── Top KPI Cards ──────────────────────────────────────────────

    function renderTopKPIs() {
      const k = mobileKPIs;
      const p = encodeURIComponent(PLATFORM);

      function kpiCard(label, value, color, borderColor, href) {
        const clickAttr = href ? `onclick="window.location.href='${href}'"` : '';
        const cursor = href ? 'cursor-pointer hover:border-slate-600' : '';
        return `
          <div ${clickAttr} class="bg-slate-900 border ${borderColor} rounded-lg p-5 transition-colors ${cursor}">
            <div class="text-3xl font-semibold font-mono ${color}">${value}</div>
            <div class="text-xs text-slate-500 mt-1.5 uppercase tracking-wider">${label}</div>
          </div>
        `;
      }

      const addedColor = k.addedToday === 0 ? 'text-green-400' : k.addedToday > 5 ? 'text-red-400' : 'text-amber-400';
      const addedBorder = k.addedToday === 0 ? 'border-green-500/20' : k.addedToday > 5 ? 'border-red-500/20' : 'border-amber-500/20';

      const today = new Date().toISOString().slice(0, 10);
      const addedHref = `bugs.html?platform=${p}&status=${encodeURIComponent('New Issue')}&from=${today}&to=${today}`;

      document.getElementById('top-kpis').innerHTML = `
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          ${kpiCard('Open Bugs', k.totalOpen, 'text-blue-400', 'border-blue-500/20', `bugs.html?platform=${p}`)}
          ${kpiCard('Added Today', k.addedToday, addedColor, addedBorder, addedHref)}
          ${kpiCard('Avg Age (days)', k.avgAgeDays, 'text-slate-200', 'border-slate-700', `bugs.html?platform=${p}&sort=age`)}
          ${kpiCard('Closed This Week', k.closedThisWeek, 'text-green-400', 'border-green-500/20', `bugs.html?platform=${p}&closed=week`)}
        </div>
      `;
    }

    // ─── Status Breakdown ───────────────────────────────────────────

    function renderStatusBreakdown() {
      const k = mobileKPIs;
      const p = encodeURIComponent(PLATFORM);
      const statusOrder = [
        'New Issue', 'Triage', 'Backlog', 'Grooming', 'Ready for Design', 'Ready for Development',
        'In Development', 'Code Review', 'PR Review', 'Development Complete',
        'Ready for QA', 'QA In Progress', 'Ready for UAT', 'UAT In Progress',
        'Ready for Production', 'Reopen',
        'On Hold', 'Blocked', 'Cannot Reproduce',
        'Released', 'Done', 'Duplicate', 'Canceled',
      ];

      const statuses = statusOrder
        .map(s => ({ name: s, count: (k.byStatus[s] || []).length }))
        .filter(s => s.count > 0);

      const segments = statuses.map(s => ({
        label: s.name,
        value: s.count,
        color: Theme.statusColor(s.name).hex,
      }));

      const cards = statuses.map(s => {
        const sc = Theme.statusColor(s.name);
        const pct = k.total > 0 ? ((s.count / k.total) * 100).toFixed(0) : 0;
        return `
          <a href="bugs.html?platform=${p}&status=${encodeURIComponent(s.name)}"
             class="bg-slate-900 border ${sc.border} rounded-lg p-3 hover:border-slate-600 transition-colors block">
            <div class="flex items-center gap-2 mb-1">
              <span class="w-2 h-2 rounded-full ${sc.dot}"></span>
              <span class="text-xs text-slate-400">${s.name}</span>
            </div>
            <div class="flex items-baseline gap-2">
              <span class="text-lg font-semibold font-mono ${sc.text}">${s.count}</span>
              <span class="text-xs text-slate-600 font-mono">${pct}%</span>
            </div>
          </a>
        `;
      }).join('');

      document.getElementById('status-section').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-6">
          <h3 class="text-sm font-semibold text-slate-200 mb-4">Status Breakdown</h3>
          <div id="mobile-status-bar" class="mb-4"></div>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">${cards}</div>
        </div>
      `;

      Charts.stackedBar('mobile-status-bar', segments, { height: 4 });
    }

    // ─── Severity Breakdown ─────────────────────────────────────────

    function renderSeverityBreakdown() {
      const k = mobileKPIs;
      const p = encodeURIComponent(PLATFORM);
      const severities = SEVERITY_LABELS.map(s => ({
        label: s,
        value: (k.openBySeverity[s] || []).length,
        color: Theme.severityColor(s).hex,
        onClick: `window.location.href='bugs.html?platform=${p}&severity=${encodeURIComponent(s)}'`,
      }));

      const noSev = (k.openBySeverity['null'] || k.openBySeverity['Unknown'] || []).length;
      if (noSev > 0) {
        severities.push({ label: 'No Severity', value: noSev, color: '#64748b' });
      }

      document.getElementById('severity-section').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-6">
          <h3 class="text-sm font-semibold text-slate-200 mb-4">Severity (Open Bugs)</h3>
          <div id="mobile-severity-donut"></div>
        </div>
      `;

      Charts.donut('mobile-severity-donut', severities, { size: 180, centerLabel: 'Open' });
    }

    // ─── Feature Area Breakdown ─────────────────────────────────────

    function renderFeatureAreaBreakdown() {
      const k = mobileKPIs;
      const p = encodeURIComponent(PLATFORM);
      const areas = Object.entries(k.openByFeatureArea)
        .map(([name, bugs]) => ({ name, count: bugs.length }))
        .sort((a, b) => b.count - a.count);

      // Dynamic feature area colors
      const FEATURE_COLOR_MAP = {
        'Flight Search': '#06b6d4',
        'Uncategorized': '#64748b',
      };
      const AUTO_COLORS = ['#3b82f6', '#22c55e', '#a855f7', '#f59e0b', '#ef4444', '#ec4899', '#14b8a6', '#6366f1', '#84cc16'];
      let autoIdx = 0;
      const featureColors = {};
      areas.forEach(a => {
        featureColors[a.name] = FEATURE_COLOR_MAP[a.name] || AUTO_COLORS[autoIdx++ % AUTO_COLORS.length];
      });

      const cards = areas.map(a => {
        const color = featureColors[a.name] || '#64748b';
        const isFlightSearch = a.name === 'Flight Search';
        const highlight = isFlightSearch ? 'border-cyan-500/30 ring-1 ring-cyan-500/10' : 'border-slate-800';
        return `
          <a href="bugs.html?platform=${p}&feature=${encodeURIComponent(a.name)}"
             class="bg-slate-900 border ${highlight} rounded-lg p-3 hover:border-slate-600 transition-colors block">
            <div class="flex items-center gap-2 mb-1">
              <span class="w-2 h-2 rounded-full" style="background:${color}"></span>
              <span class="text-xs ${isFlightSearch ? 'text-cyan-400 font-medium' : 'text-slate-400'}">${a.name}</span>
            </div>
            <div class="text-lg font-semibold font-mono text-slate-200">${a.count}</div>
          </a>
        `;
      }).join('');

      document.getElementById('feature-section').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-6">
          <h3 class="text-sm font-semibold text-slate-200 mb-4">Feature Area (Open Bugs)</h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">${cards}</div>
        </div>
      `;
    }

    // ─── Assignee Summary ───────────────────────────────────────────

    function renderAssigneeSummary() {
      const k = mobileKPIs;
      const p = encodeURIComponent(PLATFORM);
      const assignees = Object.entries(k.openByAssignee)
        .map(([name, bugs]) => ({ name, count: bugs.length }))
        .sort((a, b) => b.count - a.count);

      const items = assignees.map(a => ({
        label: a.name,
        value: a.count,
        color: a.name === 'Unassigned' ? '#64748b' : '#3b82f6',
        href: `bugs.html?platform=${p}&assignee=${encodeURIComponent(a.name)}`,
      }));

      document.getElementById('assignee-section').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-6">
          <h3 class="text-sm font-semibold text-slate-200 mb-4">Assignee (Open Bugs)</h3>
          <div id="mobile-assignee-chart"></div>
        </div>
      `;

      Charts.hbar('mobile-assignee-chart', items);
    }
  </script>
</body>
</html>
