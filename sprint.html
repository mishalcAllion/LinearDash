<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint -- Bug Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="theme.js?v=6"></script>
  <script src="data.js?v=6"></script>
  <script>window.CURRENT_PAGE = 'sprint';</script>
  <script src="nav.js?v=6"></script>
  <script src="charts.js?v=6"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
    .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200px 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
  </style>
</head>

<body class="bg-slate-950 text-slate-300 font-sans min-h-screen antialiased">
  <div id="nav-root"></div>

  <main class="ml-0 lg:ml-[260px] min-h-screen">
    <div class="max-w-[1400px] mx-auto px-6 py-8 pt-14 lg:pt-8">

      <!-- Page header -->
      <div id="page-header" class="mb-6"></div>

      <!-- KPI strip -->
      <div id="sprint-kpis" class="mb-6"></div>

      <!-- Progress bar -->
      <div id="sprint-progress" class="mb-6"></div>

      <!-- Board / List container -->
      <div id="sprint-content"></div>

    </div>
  </main>

  <script>
    let isLoading = false;
    let currentView = new URLSearchParams(window.location.search).get('view') || 'kanban';
    let kanbanGroupBy = new URLSearchParams(window.location.search).get('group') || 'status';
    let cycleData = null;
    let sprintIssues = [];
    let sprintKPIs = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!hasApiKey()) {
        window.location.href = 'settings.html';
        return;
      }

      renderHeader(true, null);
      renderLoadingState();

      try {
        cycleData = await fetchActiveCycle();
        if (!cycleData) {
          renderNoCycle();
          return;
        }
        const allIssues = await fetchCycleIssues(cycleData.id);
        // Only parent issues for the board
        sprintIssues = allIssues.filter(i => !i.parentIdentifier);
        sprintKPIs = computeSprintKPIs(allIssues);
        updateNavStats();
        renderHeader(false, cycleData);
        renderKPIs();
        renderProgress();
        renderContent();
      } catch (e) {
        renderError(e.message);
      }
    });

    async function handleRefresh() {
      if (isLoading) return;
      isLoading = true;
      renderHeader(true, cycleData);
      renderLoadingState();

      try {
        clearAllCache();
        cycleData = await fetchActiveCycle();
        if (!cycleData) { renderNoCycle(); return; }
        const allIssues = await fetchCycleIssues(cycleData.id);
        sprintIssues = allIssues.filter(i => !i.parentIdentifier);
        sprintKPIs = computeSprintKPIs(allIssues);
        updateNavStats();
        renderHeader(false, cycleData);
        renderKPIs();
        renderProgress();
        renderContent();
      } catch (e) {
        renderError(e.message);
      } finally {
        isLoading = false;
      }
    }

    function switchView(view) {
      currentView = view;
      const url = new URL(window.location);
      url.searchParams.set('view', view);
      if (view !== 'kanban') url.searchParams.delete('group');
      history.replaceState(null, '', url);
      renderContent();
    }

    function switchGroupBy(group) {
      kanbanGroupBy = group;
      const url = new URL(window.location);
      url.searchParams.set('group', group);
      history.replaceState(null, '', url);
      renderContent();
    }

    // ─── Header ─────────────────────────────────────────────────────

    function renderHeader(loading, cycle) {
      const cycleName = cycle ? cycle.name : 'Loading...';
      const dates = cycle
        ? `${Theme.formatDate(cycle.startsAt)} -- ${Theme.formatDate(cycle.endsAt)}`
        : '';

      document.getElementById('page-header').innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-xl font-semibold text-slate-100">Sprint: ${Theme.escapeHtml(cycleName)}</h2>
            <p class="text-sm text-slate-500 mt-1">${dates}</p>
            <p class="text-xs text-slate-600 mt-0.5">All issues in active cycle (parent tickets only)</p>
          </div>
          <div class="flex items-center gap-3">
            <!-- View toggle -->
            <div class="flex items-center bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
              <button onclick="switchView('kanban')"
                      class="px-3 py-1.5 text-xs font-medium transition-colors ${currentView === 'kanban' ? 'bg-blue-500/10 text-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                Kanban
              </button>
              <button onclick="switchView('list')"
                      class="px-3 py-1.5 text-xs font-medium transition-colors ${currentView === 'list' ? 'bg-blue-500/10 text-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                List
              </button>
            </div>
            ${currentView === 'kanban' ? `
            <!-- Group by toggle (kanban only) -->
            <div class="flex items-center gap-1.5">
              <span class="text-[10px] text-slate-600 uppercase tracking-wider">Group:</span>
              <div class="flex items-center bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
                <button onclick="switchGroupBy('status')"
                        class="px-2.5 py-1 text-[11px] font-medium transition-colors ${kanbanGroupBy === 'status' ? 'bg-blue-500/10 text-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                  Status
                </button>
                <button onclick="switchGroupBy('assignee')"
                        class="px-2.5 py-1 text-[11px] font-medium transition-colors ${kanbanGroupBy === 'assignee' ? 'bg-blue-500/10 text-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                  Assignee
                </button>
              </div>
            </div>
            ` : ''}
            <button onclick="handleRefresh()" ${loading ? 'disabled' : ''}
                    class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors disabled:opacity-50 flex items-center gap-2">
              <svg class="w-4 h-4 ${loading ? 'animate-spin' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              ${loading ? 'Refreshing...' : 'Refresh'}
            </button>
          </div>
        </div>
      `;
    }

    // ─── Loading / Error / No Cycle ──────────────────────────────────

    function renderLoadingState() {
      document.getElementById('sprint-kpis').innerHTML = `<div class="grid grid-cols-2 lg:grid-cols-6 gap-4">${Array(6).fill('<div class="skeleton h-20"></div>').join('')}</div>`;
      document.getElementById('sprint-progress').innerHTML = `<div class="skeleton h-8"></div>`;
      document.getElementById('sprint-content').innerHTML = `<div class="skeleton h-96"></div>`;
    }

    function renderError(msg) {
      document.getElementById('sprint-kpis').innerHTML = '';
      document.getElementById('sprint-progress').innerHTML = '';
      document.getElementById('sprint-content').innerHTML = `
        <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-6 text-center">
          <p class="text-red-400 text-sm font-medium mb-2">Failed to load sprint data</p>
          <p class="text-red-400/70 text-xs font-mono">${Theme.escapeHtml(msg)}</p>
          <button onclick="handleRefresh()" class="mt-3 px-4 py-2 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400 hover:bg-red-500/20 transition-colors">Retry</button>
        </div>
      `;
    }

    function renderNoCycle() {
      document.getElementById('sprint-kpis').innerHTML = '';
      document.getElementById('sprint-progress').innerHTML = '';
      document.getElementById('sprint-content').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-12 text-center">
          <p class="text-slate-400 text-sm mb-2">No active cycle found</p>
          <p class="text-slate-600 text-xs">Make sure there is an active sprint cycle in Linear.</p>
        </div>
      `;
    }

    // ─── KPI Strip ──────────────────────────────────────────────────

    function renderKPIs() {
      const k = sprintKPIs;
      function kpi(label, value, color, borderColor) {
        return `
          <div class="bg-slate-900 border ${borderColor} rounded-lg p-4">
            <div class="text-2xl font-semibold font-mono ${color}">${value}</div>
            <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">${label}</div>
          </div>
        `;
      }

      const issueColor = k.completionPct >= 80 ? 'text-green-400' : k.completionPct >= 50 ? 'text-amber-400' : 'text-slate-200';
      const issueBorder = k.completionPct >= 80 ? 'border-green-500/20' : k.completionPct >= 50 ? 'border-amber-500/20' : 'border-slate-700';
      const ptsColor = k.pointsPct >= 80 ? 'text-green-400' : k.pointsPct >= 50 ? 'text-amber-400' : 'text-slate-200';
      const ptsBorder = k.pointsPct >= 80 ? 'border-green-500/20' : k.pointsPct >= 50 ? 'border-amber-500/20' : 'border-slate-700';

      document.getElementById('sprint-kpis').innerHTML = `
        <div class="grid grid-cols-2 lg:grid-cols-6 gap-4">
          ${kpi('Total Issues', k.total, 'text-slate-200', 'border-slate-700')}
          ${kpi('In Progress', k.inProgress, 'text-cyan-400', 'border-cyan-500/20')}
          ${kpi('Done', k.done, 'text-green-400', 'border-green-500/20')}
          ${kpi('Blocked', k.blocked, k.blocked > 0 ? 'text-red-400' : 'text-slate-400', k.blocked > 0 ? 'border-red-500/20' : 'border-slate-700')}
          <div class="bg-slate-900 border ${issueBorder} rounded-lg p-4">
            <div class="text-2xl font-semibold font-mono ${issueColor}">${k.completionPct}%</div>
            <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Issues Done</div>
            <div class="text-[10px] text-slate-600 mt-0.5 font-mono">${k.done}/${k.total}</div>
          </div>
          <div class="bg-slate-900 border ${ptsBorder} rounded-lg p-4">
            <div class="text-2xl font-semibold font-mono ${ptsColor}">${k.pointsPct}%</div>
            <div class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">Points Done</div>
            <div class="text-[10px] text-slate-600 mt-0.5 font-mono">${k.doneEstimate}/${k.totalEstimate} pts</div>
          </div>
        </div>
      `;
    }

    // ─── Progress Bar ───────────────────────────────────────────────

    function renderProgress() {
      const k = sprintKPIs;
      const total = sprintIssues.length;
      if (total === 0) { document.getElementById('sprint-progress').innerHTML = ''; return; }

      // Count by column group
      const counts = {};
      KANBAN_COLUMNS.forEach(col => { counts[col.id] = 0; });
      counts['blocked'] = 0;

      sprintIssues.forEach(issue => {
        if (BLOCKED_STATUSES.includes(issue.status)) { counts['blocked']++; return; }
        const col = KANBAN_COLUMNS.find(c => c.statuses.includes(issue.status));
        if (col) counts[col.id]++;
      });

      const colors = {
        'backlog': '#64748b', 'ready': '#3b82f6', 'in-dev': '#06b6d4',
        'dev-done': '#14b8a6', 'qa': '#eab308', 'uat': '#10b981',
        'done': '#22c55e', 'blocked': '#ef4444',
      };

      const segments = [...KANBAN_COLUMNS, { id: 'blocked', label: 'Blocked' }]
        .filter(c => counts[c.id] > 0)
        .map(c => ({ label: c.label, value: counts[c.id], color: colors[c.id] || '#64748b' }));

      document.getElementById('sprint-progress').innerHTML = `
        <div class="bg-slate-900/50 border border-slate-800 rounded-lg p-4">
          <div id="sprint-stacked-bar"></div>
          <div class="flex flex-wrap gap-3 mt-2 text-[10px] text-slate-500">
            ${segments.map(s => `<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${s.color}"></span>${s.label}: ${s.value}</span>`).join('')}
          </div>
        </div>
      `;

      Charts.stackedBar('sprint-stacked-bar', segments, { height: 6 });
    }

    // ─── Content Switcher ───────────────────────────────────────────

    function renderContent() {
      if (currentView === 'kanban') {
        if (kanbanGroupBy === 'assignee') renderKanbanByAssignee();
        else renderKanban();
      } else {
        renderList();
      }
      // Re-render header to update toggle state
      renderHeader(false, cycleData);
    }

    // ─── Kanban Board ───────────────────────────────────────────────

    function renderKanban() {
      const byColumn = {};
      KANBAN_COLUMNS.forEach(col => { byColumn[col.id] = []; });
      byColumn['blocked'] = [];

      sprintIssues.forEach(issue => {
        if (BLOCKED_STATUSES.includes(issue.status)) {
          byColumn['blocked'].push(issue);
          return;
        }
        const col = KANBAN_COLUMNS.find(c => c.statuses.includes(issue.status));
        if (col) byColumn[col.id].push(issue);
      });

      const allColumns = [...KANBAN_COLUMNS];
      if (byColumn['blocked'].length > 0) {
        allColumns.push({ id: 'blocked', label: 'Blocked / On Hold' });
      }

      const columnColors = {
        'backlog': 'border-slate-600', 'ready': 'border-blue-500/40', 'in-dev': 'border-cyan-500/40',
        'dev-done': 'border-teal-500/40', 'qa': 'border-yellow-500/40', 'uat': 'border-emerald-500/40',
        'done': 'border-green-500/40', 'blocked': 'border-red-500/40',
      };

      const columns = allColumns.map(col => {
          const issues = byColumn[col.id] || [];
          const borderColor = columnColors[col.id] || 'border-slate-700';
          const cards = issues.length > 0
            ? issues.map(renderKanbanCard).join('')
            : `<div class="text-center py-8 text-slate-700 text-xs">No issues</div>`;

          return `
            <div class="flex-shrink-0 w-[280px]">
              <div class="flex items-center justify-between mb-3 px-1">
                <span class="text-xs font-semibold ${issues.length > 0 ? 'text-slate-300' : 'text-slate-600'} uppercase tracking-wider">${col.label}</span>
                <span class="text-[10px] font-mono bg-slate-800 ${issues.length > 0 ? 'text-slate-400' : 'text-slate-600'} px-2 py-0.5 rounded">${issues.length}</span>
              </div>
              <div class="space-y-2 max-h-[calc(100vh-320px)] overflow-y-auto pr-1">
                ${cards}
              </div>
            </div>
          `;
        }).join('');

      document.getElementById('sprint-content').innerHTML = `
        <div class="flex gap-4 overflow-x-auto pb-4">${columns}</div>
      `;
    }

    function renderKanbanCard(issue) {
      const sc = Theme.statusColor(issue.status);
      const isBlocked = BLOCKED_STATUSES.includes(issue.status);
      const blockedBorder = isBlocked ? 'border-l-2 border-l-red-500' : '';
      const priorityColors = { 1: 'text-red-400', 2: 'text-orange-400', 3: 'text-amber-400', 4: 'text-slate-500' };
      const priorityDotColors = { 1: 'bg-red-400', 2: 'bg-orange-400', 3: 'bg-amber-400', 4: 'bg-slate-500' };
      const priorityColor = priorityColors[issue.priority] || 'text-slate-600';
      const priorityBadge = issue.priority && issue.priority <= 4
        ? `<span class="flex items-center gap-1 text-[10px] ${priorityColor}"><span class="w-1.5 h-1.5 rounded-full ${priorityDotColors[issue.priority]}"></span>P${issue.priority}</span>`
        : '';

      const labelBadges = issue.allLabels
        .filter(l => !['Bug', 'Feature', 'feature-request', 'HotFix', 'Improvement', 'New Issue'].includes(l))
        .slice(0, 2)
        .map(l => `<span class="px-1.5 py-0.5 text-[10px] bg-slate-700/50 text-slate-400 rounded">${Theme.escapeHtml(l)}</span>`)
        .join('');

      return `
        <a href="${issue.url}" target="_blank" rel="noopener"
           class="block bg-slate-900 border border-slate-800 ${blockedBorder} rounded-lg p-3 hover:border-slate-600 transition-colors group">
          <div class="flex items-start justify-between gap-2 mb-1.5">
            <div class="flex items-center gap-2">
              <span class="font-mono text-[11px] text-blue-400">${issue.identifier}</span>
              ${priorityBadge}
            </div>
            <div class="flex items-center gap-1.5">
              ${issue.isBug ? '<span class="text-[10px] bg-red-500/10 text-red-400 px-1.5 py-0.5 rounded border border-red-500/20">Bug</span>' : ''}
              ${issue.estimate ? `<span class="text-[10px] font-mono bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">${issue.estimate}pt</span>` : ''}
            </div>
          </div>
          <h5 class="text-xs text-slate-200 font-medium leading-relaxed mb-2">${Theme.escapeHtml(Theme.truncate(issue.title, 80))}</h5>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5">
              ${issue.assigneeAvatar
                ? `<img src="${issue.assigneeAvatar}" class="w-5 h-5 rounded-full" alt="${Theme.escapeHtml(issue.assigneeName)}">`
                : `<span class="w-5 h-5 rounded-full bg-slate-700 flex items-center justify-center text-[10px] text-slate-400">${issue.assigneeName.charAt(0)}</span>`}
              <span class="text-[10px] text-slate-500">${Theme.escapeHtml(issue.assigneeName)}</span>
            </div>
            <div class="flex items-center gap-1">${labelBadges}</div>
          </div>
          ${isBlocked ? `<div class="mt-2 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span><span class="text-[10px] ${sc.text}">${issue.status}</span></div>` : ''}
        </a>
      `;
    }

    // ─── Kanban by Assignee ──────────────────────────────────────────

    function renderKanbanByAssignee() {
      const byAssignee = groupBy(sprintIssues, 'assigneeName');
      const sortedNames = Object.keys(byAssignee).sort((a, b) => {
        if (a === 'Unassigned') return 1;
        if (b === 'Unassigned') return -1;
        return a.localeCompare(b);
      });

      const typePri = { started: 0, unstarted: 1, backlog: 2, completed: 3, canceled: 4 };

      const columns = sortedNames.map(name => {
        const issues = byAssignee[name].sort((a, b) => {
          const diff = (typePri[a.statusType] ?? 5) - (typePri[b.statusType] ?? 5);
          if (diff !== 0) return diff;
          return new Date(b.updatedAt) - new Date(a.updatedAt);
        });

        const totalPts = issues.reduce((s, i) => s + i.estimate, 0);
        const doneCount = issues.filter(i => ['Released', 'Done'].includes(i.status) || i.statusType === 'completed').length;
        const firstIssue = issues[0];
        const avatar = firstIssue?.assigneeAvatar
          ? `<img src="${firstIssue.assigneeAvatar}" class="w-5 h-5 rounded-full" alt="${Theme.escapeHtml(name)}">`
          : `<span class="w-5 h-5 rounded-full bg-slate-700 flex items-center justify-center text-[10px] text-slate-400 font-medium">${name.charAt(0).toUpperCase()}</span>`;

        const cards = issues.map(issue => renderAssigneeKanbanCard(issue)).join('');

        return `
          <div class="flex-shrink-0 w-[280px]">
            <div class="flex items-center gap-2 mb-3 px-1">
              ${avatar}
              <div class="flex-1 min-w-0">
                <span class="text-xs font-semibold text-slate-300 truncate block">${Theme.escapeHtml(name)}</span>
                <span class="text-[10px] text-slate-500">${issues.length} issues${totalPts ? ` / ${totalPts}pts` : ''}${doneCount ? ` / ${doneCount} done` : ''}</span>
              </div>
              <span class="text-[10px] font-mono bg-slate-800 text-slate-400 px-2 py-0.5 rounded">${issues.length}</span>
            </div>
            <div class="space-y-2 max-h-[calc(100vh-320px)] overflow-y-auto pr-1">
              ${cards}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('sprint-content').innerHTML = `
        <div class="flex gap-4 overflow-x-auto pb-4">${columns}</div>
      `;
    }

    function renderAssigneeKanbanCard(issue) {
      const sc = Theme.statusColor(issue.status);
      const isBlocked = BLOCKED_STATUSES.includes(issue.status);
      const blockedBorder = isBlocked ? 'border-l-2 border-l-red-500' : '';
      const priorityColors = { 1: 'text-red-400', 2: 'text-orange-400', 3: 'text-amber-400', 4: 'text-slate-500' };
      const priorityDotColors = { 1: 'bg-red-400', 2: 'bg-orange-400', 3: 'bg-amber-400', 4: 'bg-slate-500' };
      const priorityBadge = issue.priority && issue.priority <= 4
        ? `<span class="flex items-center gap-1 text-[10px] ${priorityColors[issue.priority]}"><span class="w-1.5 h-1.5 rounded-full ${priorityDotColors[issue.priority]}"></span>P${issue.priority}</span>`
        : '';

      const labelBadges = issue.allLabels
        .filter(l => !['Bug', 'Feature', 'feature-request', 'HotFix', 'Improvement', 'New Issue'].includes(l))
        .slice(0, 2)
        .map(l => `<span class="px-1.5 py-0.5 text-[10px] bg-slate-700/50 text-slate-400 rounded">${Theme.escapeHtml(l)}</span>`)
        .join('');

      return `
        <a href="${issue.url}" target="_blank" rel="noopener"
           class="block bg-slate-900 border border-slate-800 ${blockedBorder} rounded-lg p-3 hover:border-slate-600 transition-colors group">
          <div class="flex items-start justify-between gap-2 mb-1.5">
            <div class="flex items-center gap-2">
              <span class="font-mono text-[11px] text-blue-400">${issue.identifier}</span>
              ${priorityBadge}
            </div>
            <div class="flex items-center gap-1.5">
              ${issue.isBug ? '<span class="text-[10px] bg-red-500/10 text-red-400 px-1.5 py-0.5 rounded border border-red-500/20">Bug</span>' : ''}
              ${issue.estimate ? `<span class="text-[10px] font-mono bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">${issue.estimate}pt</span>` : ''}
            </div>
          </div>
          <h5 class="text-xs text-slate-200 font-medium leading-relaxed mb-2">${Theme.escapeHtml(Theme.truncate(issue.title, 80))}</h5>
          <div class="flex items-center justify-between">
            ${Theme.statusBadge(issue.status)}
            <div class="flex items-center gap-1">${labelBadges}</div>
          </div>
          ${isBlocked ? `<div class="mt-2 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span><span class="text-[10px] ${sc.text}">${issue.status}</span></div>` : ''}
        </a>
      `;
    }

    // ─── List View ──────────────────────────────────────────────────

    function renderList() {
      const sorted = [...sprintIssues].sort((a, b) => {
        // Sort by status type priority: started > unstarted > backlog > completed > canceled
        const typePri = { started: 0, unstarted: 1, backlog: 2, completed: 3, canceled: 4 };
        const diff = (typePri[a.statusType] ?? 5) - (typePri[b.statusType] ?? 5);
        if (diff !== 0) return diff;
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });

      const rows = sorted.map(issue => {
        const sc = Theme.statusColor(issue.status);
        const isBlocked = BLOCKED_STATUSES.includes(issue.status);

        return `
          <a href="${issue.url}" target="_blank" rel="noopener"
             class="block bg-slate-900 border border-slate-800 ${isBlocked ? 'border-l-2 border-l-red-500' : ''} rounded-lg p-4 hover:border-slate-700 transition-colors group">
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                  <span class="font-mono text-xs text-blue-400">${issue.identifier}</span>
                  ${Theme.statusBadge(issue.status)}
                  ${issue.isBug ? '<span class="text-[10px] bg-red-500/10 text-red-400 px-1.5 py-0.5 rounded border border-red-500/20">Bug</span>' : ''}
                  ${issue.estimate ? `<span class="text-[10px] font-mono bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">${issue.estimate}pt</span>` : ''}
                </div>
                <h4 class="text-sm text-slate-200 font-medium">${Theme.escapeHtml(issue.title)}</h4>
                <div class="flex items-center gap-3 mt-2 text-xs text-slate-500">
                  <span>${Theme.escapeHtml(issue.assigneeName)}</span>
                  <span>Updated ${Theme.relativeTime(issue.updatedAt)}</span>
                  ${issue.priorityLabel ? `<span>${issue.priorityLabel}</span>` : ''}
                </div>
              </div>
              <svg class="w-4 h-4 text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 ml-3 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </div>
          </a>
        `;
      }).join('');

      document.getElementById('sprint-content').innerHTML = `
        <div class="space-y-2">${rows}</div>
        <div class="text-xs text-slate-600 mt-4 text-center">${sorted.length} parent issues in this sprint</div>
      `;
    }
  </script>
</body>
</html>
